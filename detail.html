<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Interview Details – InterviewEdge</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2328429365429845" crossorigin="anonymous"></script>
<style>
:root{--bg:#0a0e1a;--surface:#111827;--card:#161d2e;--border:#1e2d45;--accent:#f59e0b;--accent2:#3b82f6;--text:#e2e8f0;--muted:#64748b;--tag-bg:#1e3a5f;--tag-text:#93c5fd;--green:#10b981;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;background-image:radial-gradient(ellipse at 20% 0%,rgba(59,130,246,.08) 0%,transparent 60%);}
header{border-bottom:1px solid var(--border);background:rgba(10,14,26,.97);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;padding:0 1.5rem;}
.header-inner{max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:1rem;}
.logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:var(--text);text-decoration:none;}.logo span{color:var(--accent);}
.back-btn{display:flex;align-items:center;gap:.4rem;color:var(--muted);text-decoration:none;font-size:.83rem;font-weight:500;transition:color .2s;}.back-btn:hover{color:var(--accent);}
.page-wrap{max-width:1100px;margin:auto;padding:2rem 1.5rem;display:grid;grid-template-columns:1fr 280px;gap:2rem;align-items:start;}
.ad-banner{background:var(--surface);border:1px dashed var(--border);border-radius:10px;text-align:center;padding:1.2rem;color:var(--muted);font-size:.7rem;min-height:75px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;margin-bottom:1.5rem;}
.ad-label{letter-spacing:.1em;text-transform:uppercase;font-size:.6rem;}
.breadcrumb{display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:var(--muted);margin-bottom:1.5rem;flex-wrap:wrap;}
.breadcrumb a{color:var(--accent2);text-decoration:none;transition:color .2s;}.breadcrumb a:hover{color:var(--accent);}
.breadcrumb span{color:var(--border);}
.detail-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.detail-hero{padding:2rem;background:linear-gradient(135deg,rgba(30,58,95,.5) 0%,rgba(22,29,46,.8) 100%);border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.detail-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--green));}
.detail-badges{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;}
.badge{padding:.2rem .6rem;border-radius:4px;font-size:.7rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
.badge-company{background:var(--tag-bg);color:var(--tag-text);}
.badge-type-online{background:rgba(16,185,129,.15);color:var(--green);}
.badge-type-offline{background:rgba(239,68,68,.15);color:var(--red);}
.badge-type-walkin{background:rgba(245,158,11,.15);color:var(--accent);}
.detail-title{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;line-height:1.3;margin-bottom:.5rem;}
.detail-company{font-size:1rem;color:var(--accent);font-weight:600;}
.detail-meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;padding:1.5rem;border-bottom:1px solid var(--border);}
.meta-item{display:flex;flex-direction:column;gap:.25rem;}
.meta-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.meta-value{font-size:.88rem;font-weight:500;color:var(--text);}
.meta-value.accent{color:var(--accent);font-weight:700;}
.detail-section{padding:1.5rem;border-bottom:1px solid var(--border);}
.detail-section:last-child{border-bottom:none;}
.detail-section-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.9rem;}
.skills-wrap{display:flex;flex-wrap:wrap;gap:.5rem;}
.skill-tag{background:var(--tag-bg);color:var(--tag-text);padding:.3rem .75rem;border-radius:6px;font-size:.82rem;font-weight:500;}
.desc-text{font-size:.9rem;line-height:1.85;color:var(--text);}
.apply-box{background:linear-gradient(135deg,rgba(245,158,11,.1) 0%,rgba(59,130,246,.08) 100%);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:1.5rem;text-align:center;}
.apply-box h3{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:.4rem;}
.apply-box p{font-size:.82rem;color:var(--muted);margin-bottom:1.2rem;line-height:1.6;}
.btn-apply{display:block;background:var(--accent);color:#000;text-decoration:none;padding:.75rem 1.5rem;border-radius:9px;font-weight:700;font-size:.95rem;transition:opacity .2s,transform .1s;letter-spacing:.02em;}
.btn-apply:hover{opacity:.88;transform:translateY(-1px);}
.btn-share{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:.75rem;background:var(--surface);color:var(--muted);text-decoration:none;padding:.55rem;border-radius:8px;font-size:.8rem;font-weight:500;border:1px solid var(--border);cursor:pointer;width:100%;transition:all .2s;}
.btn-share:hover{border-color:var(--accent2);color:var(--accent2);}
.sidebar{display:flex;flex-direction:column;gap:1.5rem;}
.sidebar-widget{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.widget-header{padding:.75rem 1.1rem;border-bottom:1px solid var(--border);font-weight:600;font-size:.77rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);}
.widget-body{padding:.85rem 1.1rem;}
.related-item{padding:.6rem 0;border-bottom:1px solid var(--border);cursor:pointer;transition:color .2s;}
.related-item:last-child{border-bottom:none;}.related-item:hover{color:var(--accent);}
.related-company{font-size:.72rem;color:var(--accent2);font-weight:600;margin-bottom:.2rem;}
.related-role{font-size:.83rem;font-weight:500;}
.related-date{font-size:.7rem;color:var(--muted);margin-top:.15rem;}
footer{background:var(--surface);border-top:1px solid var(--border);padding:2rem 1.5rem 1rem;margin-top:2rem;}
.footer-bottom{max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;}
.footer-copy{font-size:.77rem;color:var(--muted);}
.footer-links-row{display:flex;gap:1.2rem;flex-wrap:wrap;}
.footer-links-row a{color:var(--muted);text-decoration:none;font-size:.77rem;transition:color .2s;}.footer-links-row a:hover{color:var(--accent);}
.wa-float{position:fixed;bottom:1.4rem;right:1.4rem;z-index:200;background:#25D366;color:#fff;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(37,211,102,.5);text-decoration:none;transition:transform .2s;}
.wa-float:hover{transform:scale(1.1);}
.not-found{text-align:center;padding:5rem 2rem;color:var(--muted);}
.not-found h2{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:1rem;}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.page-wrap{grid-template-columns:1fr;}.sidebar{order:-1;display:grid;grid-template-columns:1fr 1fr;gap:1rem;}}
@media(max-width:600px){.detail-title{font-size:1.35rem;}.detail-meta-grid{grid-template-columns:1fr 1fr;}.sidebar{grid-template-columns:1fr;}.page-wrap{padding:1rem;}}
</style>
<!-- ✅ Firebase SDK (v9 compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">Interview<span>Edge</span></a>
    <a href="index.html" class="back-btn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to Listings
    </a>
  </div>
</header>

<div class="page-wrap">
  <main id="mainContent">
    <div style="text-align:center;padding:3rem;color:var(--muted);">
      <div class="loading-spinner"></div>
      <p>Loading listing…</p>
    </div>
  </main>
  <aside class="sidebar">
    <div class="ad-banner">
      <div class="ad-label">Advertisement</div>
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2328429365429845" data-ad-slot="1122334455" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
    </div>
    <div class="sidebar-widget">
      <div class="widget-header">🔗 Related Listings</div>
      <div class="widget-body" id="relatedList"><p style="color:var(--muted);font-size:.82rem;">Loading…</p></div>
    </div>
    <div class="ad-banner">
      <div class="ad-label">Advertisement</div>
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2328429365429845" data-ad-slot="5566778899" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
    </div>
  </aside>
</div>

<footer>
  <div class="footer-bottom">
    <div class="footer-copy">© 2025 InterviewEdge · Chennai, Tamil Nadu</div>
    <div class="footer-links-row">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="disclaimer.html">Disclaimer</a>
    </div>
  </div>
</footer>

<a href="https://wa.me/919500206518" class="wa-float" target="_blank" title="Chat on WhatsApp">
  <svg width="25" height="25" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<script>
// ── Firebase init ──────────────────────────────────────────────
firebase.initializeApp(window.FIREBASE_CONFIG);
const db = firebase.firestore();
const COL = 'interviews';

// ── Helpers ────────────────────────────────────────────────────
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function fd(s){if(!s)return'N/A';return new Date(s).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});}
function tl(t){return t==='walkin'?'Walk-in':t.charAt(0).toUpperCase()+t.slice(1);}

const params = new URLSearchParams(window.location.search);
const docId  = params.get('id');
const main   = document.getElementById('mainContent');

if (!docId) {
  main.innerHTML = `<div class="not-found"><h2>No Listing ID</h2><p>Please navigate from the home page.</p><a href="index.html" style="display:inline-block;margin-top:1.5rem;background:var(--accent);color:#000;padding:.6rem 1.4rem;border-radius:8px;text-decoration:none;font-weight:700;">← Back to Home</a></div>`;
} else {
  // Load the specific document
  db.collection(COL).doc(docId).get().then(docSnap => {
    if (!docSnap.exists) {
      main.innerHTML = `<div class="not-found"><h2>Listing Not Found</h2><p>This interview listing may have been removed or the link is incorrect.</p><a href="index.html" style="display:inline-block;margin-top:1.5rem;background:var(--accent);color:#000;padding:.6rem 1.4rem;border-radius:8px;text-decoration:none;font-weight:700;">← Back to Home</a></div>`;
      document.getElementById('relatedList').innerHTML = `<p style="color:var(--muted);font-size:.82rem;">No related listings.</p>`;
      return;
    }

    const d = { id: docSnap.id, ...docSnap.data() };
    document.title = `${d.role} at ${d.company} – InterviewEdge`;

    main.innerHTML = `
      <div class="breadcrumb">
        <a href="index.html">Home</a><span>›</span>
        <a href="index.html">Listings</a><span>›</span>
        <span>${esc(d.company)}</span>
      </div>
      <div class="ad-banner">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2328429365429845" data-ad-slot="2233445566" data-ad-format="auto" data-full-width-responsive="true"></ins>
      </div>
      <div class="detail-card">
        <div class="detail-hero">
          <div class="detail-badges">
            <span class="badge badge-company">${esc(d.company)}</span>
            <span class="badge badge-type-${d.type}">${tl(d.type)}</span>
          </div>
          <div class="detail-title">${esc(d.role)}</div>
          <div class="detail-company">${esc(d.company)}</div>
        </div>
        <div class="detail-meta-grid">
          <div class="meta-item"><div class="meta-label">📅 Interview Date</div><div class="meta-value accent">${fd(d.date)}</div></div>
          <div class="meta-item"><div class="meta-label">📍 Location</div><div class="meta-value">${esc(d.location||'N/A')}</div></div>
          <div class="meta-item"><div class="meta-label">💼 Experience</div><div class="meta-value">${esc(d.experience||'N/A')}</div></div>
          <div class="meta-item"><div class="meta-label">💰 Salary / Package</div><div class="meta-value accent">${esc(d.salary||'Not disclosed')}</div></div>
          <div class="meta-item"><div class="meta-label">🏷️ Interview Type</div><div class="meta-value">${tl(d.type)}</div></div>
        </div>
        ${d.skills&&d.skills.length?`
        <div class="detail-section">
          <div class="detail-section-title">🛠 Skills Required</div>
          <div class="skills-wrap">${d.skills.map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div>
        </div>`:''}
        <div class="detail-section">
          <div class="detail-section-title">📄 About This Interview</div>
          <div class="desc-text">${esc(d.description||'No description available.').replace(/\n/g,'<br/>')}</div>
        </div>
        <div class="detail-section">
          <div class="apply-box">
            <h3>Ready to Apply?</h3>
            <p>Click below to visit the official application page for this position at ${esc(d.company)}.</p>
            ${d.applyLink?`<a class="btn-apply" href="${d.applyLink}" target="_blank" rel="noopener">🚀 Apply Now on Official Site</a>`:`<span style="color:var(--muted);font-size:.85rem;">No direct link available. Contact the company directly.</span>`}
            <button class="btn-share" onclick="shareJob()">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share this Job
            </button>
          </div>
        </div>
      </div>`;

    // Push adsense after render
    try { (adsbygoogle = window.adsbygoogle||[]).push({}); } catch(e){}

    // Load related listings
    db.collection(COL).orderBy('date','desc').limit(7).get().then(snap => {
      const related = snap.docs
        .map(doc => ({id:doc.id,...doc.data()}))
        .filter(x => x.id !== docId)
        .slice(0,6);
      document.getElementById('relatedList').innerHTML = related.length
        ? related.map(r=>`
          <div class="related-item" onclick="location.href='detail.html?id=${r.id}'">
            <div class="related-company">${esc(r.company)}</div>
            <div class="related-role">${esc(r.role)}</div>
            <div class="related-date">${fd(r.date)}</div>
          </div>`).join('')
        : `<p style="color:var(--muted);font-size:.82rem;">No related listings.</p>`;
    });

    window.shareJob = function() {
      if (navigator.share) { navigator.share({title:`${d.role} at ${d.company}`,url:window.location.href}); }
      else { navigator.clipboard.writeText(window.location.href).then(()=>alert('Link copied to clipboard!')); }
    };

  }).catch(err => {
    main.innerHTML = `<div class="not-found"><h2>Error Loading Listing</h2><p>${err.message}</p><a href="index.html" style="display:inline-block;margin-top:1.5rem;background:var(--accent);color:#000;padding:.6rem 1.4rem;border-radius:8px;text-decoration:none;font-weight:700;">← Back to Home</a></div>`;
    console.error(err);
  });
}
</script>
</body>
</html>
