<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Hub - Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #f0fdfa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .setup-container {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #10b981;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #10b981 0%, #14b8a6 100%);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        button:hover {
            box-shadow: 0 8px 12px rgba(16, 185, 129, 0.4);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid #10b981;
            display: block;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
            display: block;
        }

        .info {
            background: #dbeafe;
            color: #1e40af;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #3b82f6;
        }

        .spinner {
            border: 2px solid #e5e7eb;
            border-top-color: #10b981;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .secondary-btn {
            background: white;
            color: #10b981;
            border: 2px solid #10b981;
            margin-top: 1rem;
        }

        .secondary-btn:hover {
            background: #f0fdf4;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <h1>🔐 Setup Admin Account</h1>
        <p class="subtitle">Create your admin credentials to manage interviews</p>

        <div class="info">
            <strong>ℹ️ Default Credentials:</strong><br>
            Email: praveenmuthu9500@gmail.com<br>
            Password: 1902267171
        </div>

        <div id="message" class="message"></div>

        <form onsubmit="handleSetup(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" value="praveenmuthu9500@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" value="1902267171" required>
            </div>

            <button type="submit" id="setupBtn">Create Admin Account</button>
            <button type="button" class="secondary-btn" onclick="window.location.href='index.html'">Go to App</button>
        </form>
    </div>

    <script>
        async function handleSetup(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('setupBtn');
            const message = document.getElementById('message');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Creating account...';

            try {
                const response = await fetch(
                    'https://lwhfyefjxxvnbaygqisd.supabase.co/functions/v1/create_admin_user',
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3aGZ5ZWZqeHh2bmJheWdxaXNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODQ3NzQsImV4cCI6MjA4ODY2MDc3NH0.WVFoWfDBTquX4g50zBzis7Yay9kkfOJPLRlujIfGUFk',
                        },
                        body: JSON.stringify({ email, password })
                    }
                );

                const data = await response.json();

                if (response.ok && data.success) {
                    message.className = 'message success';
                    message.textContent = '✅ ' + data.message + ' You can now login!';
                    btn.textContent = 'Account Created! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    throw new Error(data.error || 'Failed to create account');
                }
            } catch (error) {
                message.className = 'message error';
                message.textContent = '❌ ' + error.message;
                btn.disabled = false;
                btn.textContent = 'Create Admin Account';
            }
        }
    </script>
</body>
</html>
